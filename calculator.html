<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator - UtilTool</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Calculator</h1>
    <p>Basic arithmetic calculator</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="calculator.html">Calculator</a>
    <a href="temperature.html">Temperature</a>
    <a href="currency.html">Currency</a>
    <a href="about.html">About</a>
</nav>

<div class="card">

    <h2>Calculator</h2>

    <input id="num1" type="number" placeholder="First number"
           style="width:100%;padding:10px;margin-bottom:10px;">

    <input id="num2" type="number" placeholder="Second number"
           style="width:100%;padding:10px;margin-bottom:10px;">

    <select id="operation"
            style="width:100%;padding:10px;margin-bottom:10px;">
        <option value="add">Add (+)</option>
        <option value="sub">Subtract (-)</option>
        <option value="mul">Multiply (×)</option>
        <option value="div">Divide (÷)</option>
    </select>

    <button onclick="calculate()"
            style="width:100%;padding:12px;background:#0073aa;color:white;border:none;">
        Calculate
    </button>

    <h3 id="result" style="margin-top:20px;">Result:</h3>

    <hr>

    <h3>History</h3>
    <div id="history"></div>

    <button onclick="clearHistory()"
            style="width:100%;padding:10px;margin-top:10px;">
        Clear History
    </button>

</div>

<script>
function calculate() {

    let a = parseFloat(document.getElementById("num1").value);
    let b = parseFloat(document.getElementById("num2").value);
    let op = document.getElementById("operation").value;

    if (isNaN(a) || isNaN(b)) {
        document.getElementById("result").innerText =
            "Result: Please enter valid numbers";
        return;
    }

    let result;
    let symbol;

    switch(op) {

        case "add":
            result = a + b;
            symbol = "+";
            break;

        case "sub":
            result = a - b;
            symbol = "-";
            break;

        case "mul":
            result = a * b;
            symbol = "×";
            break;

        case "div":
            if (b === 0) {
                document.getElementById("result").innerText =
                    "Result: Cannot divide by zero";
                return;
            }
            result = a / b;
            symbol = "÷";
            break;
    }

    document.getElementById("result").innerText =
        "Result: " + result;

    document.getElementById("history").innerHTML +=
        a + " " + symbol + " " + b + " = " + result + "<br>";
}

function clearHistory() {
    document.getElementById("history").innerHTML = "";
}
</script>

</body>
</html>
