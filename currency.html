<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currency Converter - UtilTool</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Currency Converter</h1>
    <p>Convert between currencies (fixed rates version)</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="calculator.html">Calculator</a>
    <a href="temperature.html">Temperature</a>
    <a href="currency.html">Currency</a>
    <a href="about.html">About</a>
</nav>

<div class="card">

    <h2>Currency Converter</h2>

    <input id="amount" type="number" placeholder="Enter amount"
           style="width:100%;padding:10px;margin-bottom:10px;">

    <select id="fromCurrency"
            style="width:100%;padding:10px;margin-bottom:10px;">
        <option value="SEK">SEK (Swedish Krona)</option>
        <option value="EUR">EUR (Euro)</option>
        <option value="USD">USD (US Dollar)</option>
    </select>

    <select id="toCurrency"
            style="width:100%;padding:10px;margin-bottom:10px;">
        <option value="EUR">EUR (Euro)</option>
        <option value="USD">USD (US Dollar)</option>
        <option value="SEK">SEK (Swedish Krona)</option>
    </select>

    <button onclick="convertCurrency()"
            style="width:100%;padding:12px;background:#0073aa;color:white;border:none;">
        Convert
    </button>

    <h3 id="currencyResult" style="margin-top:20px;">Result:</h3>

    <hr>

    <h3>History</h3>
    <div id="currencyHistory"></div>

    <button onclick="clearHistory()"
            style="width:100%;padding:10px;margin-top:10px;">
        Clear History
    </button>

</div>

<script>
function convertCurrency() {

    let amount = parseFloat(document.getElementById("amount").value);
    let from = document.getElementById("fromCurrency").value;
    let to = document.getElementById("toCurrency").value;

    if (isNaN(amount)) {
        document.getElementById("currencyResult").innerText =
            "Result: Please enter a valid number";
        return;
    }

    // 💡 Fixed exchange rates (relative to 1 USD)
    const rates = {
        USD: 1,
        EUR: 0.92,
        SEK: 10.5
    };

    // Convert via USD as base
    let usdValue = amount / rates[from];
    let result = usdValue * rates[to];

    document.getElementById("currencyResult").innerText =
        `${amount} ${from} = ${result.toFixed(2)} ${to}`;

    document.getElementById("currencyHistory").innerHTML +=
        `${amount} ${from} → ${result.toFixed(2)} ${to}<br>`;
}

function clearHistory() {
    document.getElementById("currencyHistory").innerHTML = "";
}
</script>

</body>
</html>
